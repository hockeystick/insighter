{% extends "base.html" %}

{% block title %}Synthesis failed — {{ diagnostic.outlet.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-semibold mb-2">Synthesis failed</h1>
  <p class="text-sm text-stone-600 mb-4">
    {{ diagnostic.outlet.name }} · diagnostic {{ diagnostic.date }}
  </p>
  <pre class="bg-white border rounded p-4 text-sm text-red-800 whitespace-pre-wrap">{{ error }}</pre>
  <div class="mt-4">
    <a href="{% url 'diagnostics:diagnostic_detail' diagnostic.pk %}" class="text-sm text-stone-600 hover:text-stone-900">← back to diagnostic</a>
  </div>
</div>
{% endblock %}
